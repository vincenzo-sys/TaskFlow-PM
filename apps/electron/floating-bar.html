<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Bar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    /* ── Base bar ── */
    .floating-bar {
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.3);
      overflow: visible;
      position: relative;
      transition: border-radius 0.2s ease;
    }

    .floating-bar.mode-mini { border-radius: 20px; }

    /* ── Header ── */
    .bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      background: rgba(255, 255, 255, 0.04);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      cursor: move;
      -webkit-app-region: drag;
      gap: 4px;
    }

    .bar-header-left {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .bar-header-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.35);
    }

    .bar-task-count {
      font-size: 9px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      padding: 1px 5px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      min-width: 18px;
      text-align: center;
    }

    .bar-header-right {
      display: flex;
      align-items: center;
      gap: 2px;
      -webkit-app-region: no-drag;
    }

    .header-btn {
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: rgba(255, 255, 255, 0.25);
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      padding: 0;
      position: relative;
    }
    .header-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.5);
    }
    .header-btn.close-btn:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    /* ── MINI mode ── */
    .mode-mini .bar-header {
      padding: 4px 10px;
      border-bottom: none;
    }
    .mode-mini .bar-header-label { display: none; }
    .mode-mini .bar-tasks { display: none; }
    .mode-mini .resize-grip { display: none; }

    /* ── Dropdown menu ── */
    .dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: #252538;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      min-width: 140px;
      padding: 4px;
      z-index: 100;
    }
    .dropdown-menu.visible { display: block; }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 5px;
      border: none;
      background: none;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.1s ease;
    }
    .dropdown-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.95);
    }
    .dropdown-item.active {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
    }
    .dropdown-item .item-icon {
      width: 16px;
      text-align: center;
      font-size: 10px;
      flex-shrink: 0;
    }

    .dropdown-sep {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 4px 6px;
    }

    /* ── Task list ── */
    .bar-tasks {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .bar-tasks::-webkit-scrollbar { width: 3px; }
    .bar-tasks::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
    }

    /* ── Task row ── */
    .task-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: background 0.12s ease;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: rgba(255, 255, 255, 0.04); }

    .task-priority-dot {
      width: 3px;
      height: 22px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .task-priority-dot.urgent { background: #ef4444; }
    .task-priority-dot.high { background: #f97316; }
    .task-priority-dot.medium { background: #eab308; }
    .task-priority-dot.low { background: #22c55e; }
    .task-priority-dot.none { background: rgba(255, 255, 255, 0.12); }

    .task-name {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .task-name:hover { color: #93c5fd; }

    /* Compact mode */
    .mode-compact .task-row { padding: 4px 10px; gap: 6px; }
    .mode-compact .task-priority-dot { width: 2px; height: 16px; }
    .mode-compact .task-name { font-size: 11px; }
    .mode-compact .task-actions { display: none; }
    .mode-compact .task-row:hover .task-actions { display: flex; }
    .mode-compact .task-subtask-badge { font-size: 8px; padding: 0 4px; }

    /* ── Subtask badge ── */
    .task-subtask-badge {
      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      padding: 1px 5px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      flex-shrink: 0;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.15s ease;
    }
    .task-subtask-badge:hover { background: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.6); }
    .task-subtask-badge.expanded { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }

    /* ── Action buttons ── */
    .task-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .task-btn {
      width: 20px;
      height: 20px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: rgba(255, 255, 255, 0.25);
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s ease;
    }
    .task-btn.complete:hover { background: rgba(34, 197, 94, 0.3); color: #86efac; }
    .task-btn.copy:hover { background: rgba(99, 102, 241, 0.3); color: #a5b4fc; }
    .task-btn.copy.copied { background: rgba(34, 197, 94, 0.3); color: #86efac; }
    .task-btn.remove:hover { background: rgba(239, 68, 68, 0.25); color: #fca5a5; }

    /* ── Subtasks panel ── */
    .task-subtasks {
      display: none;
      padding: 3px 10px 6px 22px;
      background: rgba(0, 0, 0, 0.1);
    }
    .task-subtasks.visible { display: block; }
    .mode-compact .task-subtasks { padding-left: 18px; }

    .subtask-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }
    .subtask-item.done { color: rgba(255, 255, 255, 0.25); text-decoration: line-through; }

    .subtask-check {
      width: 12px;
      height: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: transparent;
      cursor: pointer;
      transition: all 0.12s ease;
      flex-shrink: 0;
    }
    .subtask-check:hover { border-color: rgba(255, 255, 255, 0.5); background: rgba(255, 255, 255, 0.06); }
    .subtask-item.done .subtask-check { background: rgba(34, 197, 94, 0.35); border-color: rgba(34, 197, 94, 0.5); color: white; }

    .subtask-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Empty state ── */
    .bar-empty {
      padding: 12px;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      font-style: italic;
    }

    /* ── Resize grip (bottom-right corner) ── */
    .resize-grip {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 3px;
      border-radius: 0 0 12px 0;
      transition: background 0.15s ease;
    }
    .resize-grip:hover { background: rgba(255, 255, 255, 0.06); }
    .resize-grip svg {
      width: 10px;
      height: 10px;
      opacity: 0.2;
      transition: opacity 0.15s ease;
    }
    .resize-grip:hover svg { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="floating-bar" id="floating-bar">
    <div class="bar-header" id="bar-header">
      <div class="bar-header-left">
        <span class="bar-header-label">Active</span>
        <span class="bar-task-count" id="task-count">0</span>
      </div>
      <div class="bar-header-right">
        <button class="header-btn" id="menu-btn" title="Options">&#8942;</button>
        <button class="header-btn close-btn" id="close-btn" title="Close bar">&times;</button>
        <!-- Dropdown -->
        <div class="dropdown-menu" id="dropdown-menu">
          <button class="dropdown-item active" data-mode="full">
            <span class="item-icon">&#9638;</span> Full
          </button>
          <button class="dropdown-item" data-mode="compact">
            <span class="item-icon">&#8801;</span> Compact
          </button>
          <button class="dropdown-item" data-mode="mini">
            <span class="item-icon">&#9679;</span> Mini
          </button>
        </div>
      </div>
    </div>
    <div class="bar-tasks" id="bar-tasks">
      <div class="bar-empty">No active tasks</div>
    </div>
    <!-- Resize grip corner -->
    <div class="resize-grip" id="resize-grip">
      <svg viewBox="0 0 10 10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5">
        <line x1="9" y1="1" x2="1" y2="9"/>
        <line x1="9" y1="5" x2="5" y2="9"/>
        <line x1="9" y1="8" x2="8" y2="9"/>
      </svg>
    </div>
  </div>

  <script>
    const bar = document.getElementById('floating-bar');
    const tasksContainer = document.getElementById('bar-tasks');
    const taskCountEl = document.getElementById('task-count');
    const closeBtn = document.getElementById('close-btn');
    const menuBtn = document.getElementById('menu-btn');
    const dropdown = document.getElementById('dropdown-menu');

    let currentTasks = [];
    let expandedTaskIds = new Set();
    let currentMode = 'full';

    // ── Dropdown toggle ──
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('visible');
    });

    // Close dropdown when clicking anywhere else
    document.addEventListener('click', () => {
      dropdown.classList.remove('visible');
    });
    dropdown.addEventListener('click', (e) => e.stopPropagation());

    // ── View mode switching via dropdown ──
    dropdown.querySelectorAll('[data-mode]').forEach(item => {
      item.addEventListener('click', () => {
        setMode(item.dataset.mode);
        dropdown.classList.remove('visible');
      });
    });

    function setMode(mode) {
      currentMode = mode;
      bar.classList.remove('mode-full', 'mode-compact', 'mode-mini');
      bar.classList.add('mode-' + mode);

      // Update active state in dropdown
      dropdown.querySelectorAll('[data-mode]').forEach(item => {
        item.classList.toggle('active', item.dataset.mode === mode);
      });

      setTimeout(() => window.floatingBarApi.resize(), 50);
    }

    // Double-click header to toggle mini
    document.getElementById('bar-header').addEventListener('dblclick', () => {
      setMode(currentMode === 'mini' ? 'full' : 'mini');
    });

    // ── Resize grip drag ──
    const grip = document.getElementById('resize-grip');
    let resizing = false;
    let resizeStartX, resizeStartY, startWidth, startHeight;

    grip.addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      resizing = true;
      resizeStartX = e.screenX;
      resizeStartY = e.screenY;
      // Get current size from the bar element
      startWidth = bar.offsetWidth;
      startHeight = bar.offsetHeight;
      document.body.style.cursor = 'nwse-resize';
    });

    document.addEventListener('mousemove', (e) => {
      if (!resizing) return;
      const dx = e.screenX - resizeStartX;
      const dy = e.screenY - resizeStartY;
      const newW = Math.max(180, startWidth + dx);
      const newH = Math.max(40, startHeight + dy);
      window.floatingBarApi.setSize(newW, newH);
    });

    document.addEventListener('mouseup', () => {
      if (resizing) {
        resizing = false;
        document.body.style.cursor = '';
      }
    });

    // ── Tasks update from main process ──
    window.floatingBarApi.onTasksUpdate((tasks) => {
      currentTasks = tasks || [];
      renderTasks();
      if (!resizing) window.floatingBarApi.resize();
    });

    function renderTasks() {
      taskCountEl.textContent = currentTasks.length;

      if (currentTasks.length === 0) {
        tasksContainer.innerHTML = '<div class="bar-empty">No active tasks</div>';
        return;
      }

      tasksContainer.innerHTML = currentTasks.map(task => {
        const subtasks = task.subtasks || [];
        const doneCount = subtasks.filter(s => s.status === 'done').length;
        const hasSubtasks = subtasks.length > 0;
        const isExpanded = expandedTaskIds.has(task.id);

        return `
          <div class="task-row" data-task-id="${task.id}">
            <div class="task-priority-dot ${task.priority}"></div>
            <span class="task-name" data-task-id="${task.id}">${escapeHtml(task.name)}</span>
            ${hasSubtasks ? `
              <span class="task-subtask-badge ${isExpanded ? 'expanded' : ''}" data-task-id="${task.id}" title="Toggle subtasks">
                ${doneCount}/${subtasks.length}
              </span>
            ` : ''}
            <div class="task-actions">
              <button class="task-btn copy" data-task-id="${task.id}" title="Copy for Claude">&#128203;</button>
              <button class="task-btn complete" data-task-id="${task.id}" title="Complete">&#10003;</button>
              <button class="task-btn remove" data-task-id="${task.id}" title="Remove">&times;</button>
            </div>
          </div>
          ${hasSubtasks ? `
            <div class="task-subtasks ${isExpanded ? 'visible' : ''}" data-subtasks-for="${task.id}">
              ${renderSubtasks(task)}
            </div>
          ` : ''}
        `;
      }).join('');

      bindEvents();
    }

    function renderSubtasks(task) {
      const subtasks = task.subtasks || [];
      if (subtasks.length === 0) return '';

      const sorted = [...subtasks].sort((a, b) => {
        if (a.status === 'done' && b.status !== 'done') return 1;
        if (a.status !== 'done' && b.status === 'done') return -1;
        return 0;
      });

      return sorted.map(st => `
        <div class="subtask-item ${st.status === 'done' ? 'done' : ''}" data-subtask-id="${st.id}" data-task-id="${task.id}">
          <div class="subtask-check">${st.status === 'done' ? '&#10003;' : ''}</div>
          <span class="subtask-name">${escapeHtml(st.name)}</span>
        </div>
      `).join('');
    }

    function bindEvents() {
      tasksContainer.querySelectorAll('.task-name').forEach(el => {
        el.addEventListener('click', () => window.floatingBarApi.showMain());
      });

      tasksContainer.querySelectorAll('.task-subtask-badge').forEach(badge => {
        badge.addEventListener('click', () => {
          const id = badge.dataset.taskId;
          expandedTaskIds.has(id) ? expandedTaskIds.delete(id) : expandedTaskIds.add(id);
          renderTasks();
          window.floatingBarApi.resize();
        });
      });

      tasksContainer.querySelectorAll('.task-btn.complete').forEach(btn => {
        btn.addEventListener('click', () => window.floatingBarApi.completeTask(btn.dataset.taskId));
      });

      tasksContainer.querySelectorAll('.task-btn.copy').forEach(btn => {
        btn.addEventListener('click', () => {
          const task = currentTasks.find(t => t.id === btn.dataset.taskId);
          if (!task) return;
          let text = `# ${task.name}\n\n`;
          if (task.description) text += `## Description\n${task.description}\n\n`;
          if (task.context) text += `## Context\n${task.context}\n\n`;
          if (task.subtasks && task.subtasks.length > 0) {
            text += `## Subtasks\n`;
            task.subtasks.forEach(st => { text += `- [${st.status === 'done' ? 'x' : ' '}] ${st.name}\n`; });
            text += '\n';
          }
          if (task.workNotes) text += `## Notes\n${task.workNotes}\n\n`;
          window.floatingBarApi.copyToClipboard(text);
          btn.classList.add('copied');
          btn.innerHTML = '&#10003;';
          setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '&#128203;'; }, 1500);
        });
      });

      tasksContainer.querySelectorAll('.task-btn.remove').forEach(btn => {
        btn.addEventListener('click', () => window.floatingBarApi.removeTask(btn.dataset.taskId));
      });

      tasksContainer.querySelectorAll('.subtask-check').forEach(check => {
        check.addEventListener('click', () => {
          const item = check.closest('.subtask-item');
          window.floatingBarApi.toggleSubtask(item.dataset.taskId, item.dataset.subtaskId);
        });
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    closeBtn.addEventListener('click', () => window.floatingBarApi.close());

    // Initialize
    setMode('full');
  </script>
</body>
</html>
